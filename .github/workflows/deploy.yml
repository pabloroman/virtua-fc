name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (defaults to commit SHA)'
        required: false
        type: string
      deploy:
        description: 'Run the deploy step'
        required: false
        type: boolean
        default: false
      environment:
        description: 'Target environment for the deploy step'
        required: false
        type: choice
        options:
          - staging
          - production
        default: staging

concurrency:
  group: deploy-hetzner-${{ inputs.environment || 'production' }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # Builds and pushes to GHCR on push-to-main and on manual dispatch.
  # Feature-branch pushes don't build by default (wasteful) — use
  # workflow_dispatch from the Actions tab to build/deploy any branch
  # for staging or first-time bootstrap. Tagging:
  #   - <12-char-sha>           always
  #   - <branch-name slugified> always
  #   - latest                  only on main
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve primary tag
        id: meta
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_SHA::12}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Compute Docker tags
        id: tags
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.tag }}
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy only on main pushes, or when workflow_dispatch was invoked with
  # deploy=true. Feature-branch pushes stop after build — useful for
  # publishing an image to GHCR before the prod box is reachable.
  deploy:
    needs: [build]
    if: ${{ github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.deploy) }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: https://${{ vars.APP_DOMAIN }}
    steps:
      # Need the deploy/hetzner/ tree to rsync compose files and scripts to
      # the server. Without this, changes to docker-compose.yml or deploy.sh
      # never reach production — the box keeps using whatever was rsync'd
      # during bootstrap.
      - uses: actions/checkout@v6

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          test -n "$SSH_KEY" || { echo "HETZNER_SSH_KEY is empty for environment '${{ inputs.environment || 'production' }}'"; exit 1; }
          test -n "$HOST"    || { echo "HETZNER_HOST is empty for environment '${{ inputs.environment || 'production' }}'"; exit 1; }
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      # Sync the compose files and scripts from the repo to the server.
      # Bootstrap.sh rsyncs these once; without this step, edits to
      # docker-compose.yml / deploy.sh / etc. would only ever land on
      # the box if someone re-ran bootstrap or rsync'd by hand.
      - name: Sync deploy tree to server
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh "$USER@$HOST" "sudo install -d -m 0755 -o $USER -g $USER \
            /srv/virtua-fc \
            /srv/virtua-fc/compose \
            /srv/virtua-fc/scripts \
            /srv/virtua-fc/grafana \
            /srv/virtua-fc/grafana/provisioning \
            /srv/virtua-fc/grafana/dashboards \
            /srv/virtua-fc/prometheus \
            /srv/virtua-fc/promtail"
          rsync -az --delete deploy/hetzner/compose/    "$USER@$HOST:/srv/virtua-fc/compose/"
          rsync -az --delete deploy/hetzner/scripts/    "$USER@$HOST:/srv/virtua-fc/scripts/"
          rsync -az --delete deploy/hetzner/grafana/    "$USER@$HOST:/srv/virtua-fc/grafana/"
          rsync -az --delete deploy/hetzner/prometheus/ "$USER@$HOST:/srv/virtua-fc/prometheus/"
          rsync -az --delete deploy/hetzner/promtail/   "$USER@$HOST:/srv/virtua-fc/promtail/"
          ssh "$USER@$HOST" "chmod +x /srv/virtua-fc/scripts/*.sh"

      # Render the production .env from GitHub Secrets (sensitive) and Variables
      # (config). This is the single source of truth — the file on the server is
      # overwritten on every deploy. Any hand-edits there will be lost.
      #
      # Secrets must exist in the environment ('${{ inputs.environment || 'production' }}'):
      #   HETZNER_HOST, HETZNER_USER, HETZNER_SSH_KEY (SSH access)
      #   APP_KEY, DB_PASSWORD, REDIS_PASSWORD, RESEND_API_KEY,
      #   NIGHTWATCH_TOKEN, GRAFANA_ADMIN_PASSWORD,
      #   LOG_SLACK_WEBHOOK_URL (optional), STORAGEBOX_USER, STORAGEBOX_HOST
      # Variables (non-sensitive):
      #   APP_DOMAIN, ACME_EMAIL, MAIL_FROM_ADDRESS
      #   Optional with defaults: GHCR_REPO, APP_LOCALE, APP_TIMEZONE, LOG_LEVEL,
      #   BETA_MODE, DB_DATABASE, DB_USERNAME, MAIL_MAILER, MAIL_FROM_NAME,
      #   TRUSTED_PROXIES, NIGHTWATCH_ENABLED, PULSE_ENABLED, GRAFANA_ADMIN_USER,
      #   BACKUP_RETENTION_DAYS, STORAGEBOX_PATH
      - name: Render production .env
        env:
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
          GHCR_REPO: ${{ vars.GHCR_REPO || github.repository }}
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          ACME_EMAIL: ${{ vars.ACME_EMAIL }}
          APP_LOCALE: ${{ vars.APP_LOCALE || 'es' }}
          APP_TIMEZONE: ${{ vars.APP_TIMEZONE || 'UTC' }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'info' }}
          BETA_MODE: ${{ vars.BETA_MODE || 'false' }}
          DB_DATABASE: ${{ vars.DB_DATABASE || 'virtua_fc' }}
          DB_USERNAME: ${{ vars.DB_USERNAME || 'virtua_fc' }}
          MAIL_MAILER: ${{ vars.MAIL_MAILER || 'resend' }}
          MAIL_FROM_ADDRESS: ${{ vars.MAIL_FROM_ADDRESS }}
          MAIL_FROM_NAME: ${{ vars.MAIL_FROM_NAME || 'VirtuaFC' }}
          TRUSTED_PROXIES: ${{ vars.TRUSTED_PROXIES || '*' }}
          NIGHTWATCH_ENABLED: ${{ vars.NIGHTWATCH_ENABLED || 'true' }}
          PULSE_ENABLED: ${{ vars.PULSE_ENABLED || 'true' }}
          GRAFANA_ADMIN_USER: ${{ vars.GRAFANA_ADMIN_USER || 'admin' }}
          BACKUP_RETENTION_DAYS: ${{ vars.BACKUP_RETENTION_DAYS || '14' }}
          STORAGEBOX_PATH: ${{ vars.STORAGEBOX_PATH || '/home/virtua-fc/backups' }}
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD || 'null' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NIGHTWATCH_TOKEN: ${{ secrets.NIGHTWATCH_TOKEN }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          LOG_SLACK_WEBHOOK_URL: ${{ secrets.LOG_SLACK_WEBHOOK_URL }}
          STORAGEBOX_USER: ${{ secrets.STORAGEBOX_USER }}
          STORAGEBOX_HOST: ${{ secrets.STORAGEBOX_HOST }}
        run: |
          # Fail fast if a required value is missing (compose would die later anyway).
          for v in APP_DOMAIN ACME_EMAIL MAIL_FROM_ADDRESS APP_KEY DB_PASSWORD GRAFANA_ADMIN_PASSWORD; do
            if [ -z "${!v}" ]; then
              echo "::error::Required env value '$v' is empty in environment '${{ inputs.environment || 'production' }}'"
              exit 1
            fi
          done

          umask 077
          {
            echo "# Rendered by .github/workflows/deploy.yml — do not edit on the server."
            echo "# Source of truth: GitHub environment '${{ inputs.environment || 'production' }}' (Secrets + Variables)."
            echo "# Last render: $(date -u +%Y-%m-%dT%H:%M:%SZ) (commit ${GITHUB_SHA:0:12})"
            echo
            echo "GHCR_REPO=${GHCR_REPO}"
            echo "IMAGE_TAG=${IMAGE_TAG}"
            echo
            echo "APP_DOMAIN=${APP_DOMAIN}"
            echo "APP_URL=https://${APP_DOMAIN}"
            echo "ACME_EMAIL=${ACME_EMAIL}"
            echo
            echo "APP_ENV=production"
            echo "APP_KEY=${APP_KEY}"
            echo "APP_LOCALE=${APP_LOCALE}"
            echo "APP_TIMEZONE=${APP_TIMEZONE}"
            echo "LOG_LEVEL=${LOG_LEVEL}"
            echo "BETA_MODE=${BETA_MODE}"
            echo
            echo "DB_DATABASE=${DB_DATABASE}"
            echo "DB_USERNAME=${DB_USERNAME}"
            echo "DB_PASSWORD=${DB_PASSWORD}"
            echo
            echo "REDIS_PASSWORD=${REDIS_PASSWORD}"
            echo
            echo "MAIL_MAILER=${MAIL_MAILER}"
            echo "MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}"
            echo "MAIL_FROM_NAME=${MAIL_FROM_NAME}"
            echo "RESEND_API_KEY=${RESEND_API_KEY}"
            echo
            echo "TRUSTED_PROXIES=${TRUSTED_PROXIES}"
            echo
            echo "NIGHTWATCH_ENABLED=${NIGHTWATCH_ENABLED}"
            echo "NIGHTWATCH_TOKEN=${NIGHTWATCH_TOKEN}"
            echo "PULSE_ENABLED=${PULSE_ENABLED}"
            echo "LOG_SLACK_WEBHOOK_URL=${LOG_SLACK_WEBHOOK_URL}"
            echo
            echo "GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER}"
            echo "GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}"
            echo
            echo "BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS}"
            echo "STORAGEBOX_USER=${STORAGEBOX_USER}"
            echo "STORAGEBOX_HOST=${STORAGEBOX_HOST}"
            echo "STORAGEBOX_PATH=${STORAGEBOX_PATH}"
          } > production.env

      # Capture the currently-running app image tag BEFORE we overwrite .env, so
      # rollback.sh has a target. We read it from the running container (ground
      # truth) rather than the old .env, so a manual `docker compose up` between
      # deploys is still rollback-safe.
      - name: Record rollback target
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh "$USER@$HOST" '
            set -e
            CID=$(/srv/virtua-fc/scripts/compose.sh ps -q app 2>/dev/null || true)
            if [ -n "$CID" ]; then
              IMG=$(docker inspect --format="{{.Config.Image}}" "$CID")
              echo "${IMG##*:}" > /srv/virtua-fc/env/.previous
              echo "Recorded rollback target: $(cat /srv/virtua-fc/env/.previous)"
            else
              echo "No running app container — skipping rollback record (first deploy?)"
            fi
          '

      - name: Sync .env to server
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          # Ensure the env dir exists. bootstrap.sh creates it, but a server
          # bootstrapped before that step (or with the deploy tree not yet
          # rsynced) may be missing it. sudo is configured NOPASSWD for the
          # deploy user, so this is safe in CI.
          ssh "$USER@$HOST" "sudo install -d -m 0755 -o $USER -g $USER /srv/virtua-fc/env"
          scp -p production.env "$USER@$HOST:/srv/virtua-fc/env/.env"
          ssh "$USER@$HOST" "chmod 600 /srv/virtua-fc/env/.env"
          rm -f production.env

      # Ensure postgres data lives at /var/lib/virtua-fc/postgres in the
      # postgres:18 nested layout (/var/lib/virtua-fc/postgres/<major>/docker).
      #
      # Possible starting states this step handles:
      #
      #   A. Bind mount already nested (.../<ver>/docker/PG_VERSION exists).
      #      → No-op, just force-recreate so any compose change is applied.
      #
      #   B. Bind mount has root-layout data ($DATA/PG_VERSION exists, from
      #      a server bootstrapped under :/var/lib/postgresql/data). Move it
      #      into <ver>/docker.
      #
      #   C. Bind mount has data/ subdir layout ($DATA/data/PG_VERSION).
      #      Same — move into <ver>/docker.
      #
      #   D. Bind mount EMPTY but the running postgres container has an
      #      anonymous Docker volume at /var/lib/postgresql (auto-created
      #      by the postgres:18 image because the previous compose only
      #      mounted :/var/lib/postgresql/data, leaving the parent VOLUME
      #      directive to spawn an anon vol). The real data is in the anon
      #      vol; we copy it into the bind mount so the new compose's
      #      :/var/lib/postgresql mount picks it up. Without this, a
      #      force-recreate would orphan the anon vol and initdb a fresh DB.
      #
      #   E. Bind mount empty AND no anon vol with data. First-ever deploy.
      #      Postgres will initdb on the empty bind mount.
      #
      # After whichever branch applies, postgres is force-recreated so
      # docker-compose.yml mount changes are applied.
      - name: Place postgres data on the bind mount
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh "$USER@$HOST" '
            set -euo pipefail
            DATA=/var/lib/virtua-fc/postgres

            echo "::group::Host state of $DATA"
            sudo ls -la "$DATA" || true
            for sub in data 17 18 19; do
              if sudo test -d "$DATA/$sub"; then
                echo "--- $DATA/$sub ---"
                sudo ls -la "$DATA/$sub" || true
              fi
            done
            echo "::endgroup::"

            echo "::group::Running postgres container mounts"
            docker inspect virtua-fc-postgres-1 \
              --format "{{range .Mounts}}{{.Type}}  {{.Source}} -> {{.Destination}}{{println}}{{end}}" 2>/dev/null || echo "(no virtua-fc-postgres-1 container — first deploy?)"
            echo "::endgroup::"

            # Case A: already nested → no-op.
            if sudo find "$DATA" -maxdepth 3 -path "*/docker/PG_VERSION" -print -quit | grep -q .; then
              echo "Bind mount already in nested layout — no data move needed."

            # Case B: root layout.
            elif sudo test -e "$DATA/PG_VERSION"; then
              VER=$(sudo cat "$DATA/PG_VERSION")
              echo "Migrating root-layout data → $DATA/$VER/docker (PG_VERSION=$VER)"
              /srv/virtua-fc/scripts/compose.sh stop postgres || true
              STAGE="${DATA}.migrating"; sudo rm -rf "$STAGE"; sudo mkdir "$STAGE"
              sudo find "$DATA" -mindepth 1 -maxdepth 1 -exec mv -t "$STAGE" {} +
              sudo mkdir -p "$DATA/$VER"
              sudo mv "$STAGE" "$DATA/$VER/docker"

            # Case C: data/ subdir layout.
            elif sudo test -e "$DATA/data/PG_VERSION"; then
              VER=$(sudo cat "$DATA/data/PG_VERSION")
              echo "Migrating data/-layout → $DATA/$VER/docker (PG_VERSION=$VER)"
              /srv/virtua-fc/scripts/compose.sh stop postgres || true
              sudo mkdir -p "$DATA/$VER"
              sudo mv "$DATA/data" "$DATA/$VER/docker"

            else
              # Cases D / E: bind mount empty.
              ANON_PATH=$(docker inspect virtua-fc-postgres-1 \
                --format "{{range .Mounts}}{{if and (eq .Type \"volume\") (eq .Destination \"/var/lib/postgresql\")}}{{.Source}}{{end}}{{end}}" 2>/dev/null || true)
              if [ -n "$ANON_PATH" ] && sudo find "$ANON_PATH" -name PG_VERSION -print -quit 2>/dev/null | grep -q .; then
                # Case D: copy data out of the anonymous volume into the bind mount.
                echo "Found data in anonymous volume at $ANON_PATH — copying into $DATA"
                /srv/virtua-fc/scripts/compose.sh stop postgres || true
                # cp -a preserves perms/owner/timestamps. The /. on src copies contents, not the dir itself.
                sudo cp -a "$ANON_PATH/." "$DATA/"
                echo "Copied. The anonymous volume is left in place — drop it manually with \"docker volume rm $(basename "$ANON_PATH")\" once the new layout is verified."
              else
                # Case E: nothing to migrate; postgres will initdb on the empty bind mount.
                echo "Bind mount is empty and no anonymous volume with data found — postgres will initdb fresh."
              fi
            fi

            sudo chown -R 999:999 "$DATA"

            echo "::group::Host state of $DATA after"
            sudo ls -la "$DATA" || true
            for sub in data 17 18 19; do
              if sudo test -d "$DATA/$sub"; then
                echo "--- $DATA/$sub ---"
                sudo ls -la "$DATA/$sub" || true
              fi
            done
            echo "::endgroup::"

            echo "Force-recreating postgres container so compose mount changes apply"
            /srv/virtua-fc/scripts/compose.sh up -d --force-recreate --no-deps postgres
          '

      - name: Deploy
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh "$USER@$HOST" "/srv/virtua-fc/scripts/deploy.sh"

      - name: Smoke test
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh "$USER@$HOST" "/srv/virtua-fc/scripts/smoketest.sh"

      # Surface container state and recent logs whenever any prior step failed,
      # so a failed deploy doesn't require an SSH session to diagnose.
      - name: Diagnostics on failure
        if: failure()
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh "$USER@$HOST" '
            set +e
            echo "::group::compose ps"
            /srv/virtua-fc/scripts/compose.sh ps
            echo "::endgroup::"
            for svc in postgres redis app horizon scheduler traefik; do
              echo "::group::logs $svc (tail 80)"
              /srv/virtua-fc/scripts/compose.sh logs --no-color --tail=80 "$svc" || true
              echo "::endgroup::"
            done
            echo "::group::disk usage"
            df -h /var/lib/virtua-fc /srv/virtua-fc 2>/dev/null
            echo "::endgroup::"
          '

      - name: Rollback on failure
        if: failure()
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh "$USER@$HOST" "/srv/virtua-fc/scripts/rollback.sh"
