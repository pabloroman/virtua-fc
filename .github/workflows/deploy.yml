name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (defaults to commit SHA)'
        required: false
        type: string

concurrency:
  group: deploy-hetzner
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  wait-for-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: tests
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

  build:
    needs: [wait-for-tests]
    if: ${{ always() && (needs.wait-for-tests.result == 'success' || needs.wait-for-tests.result == 'skipped') }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag
        id: meta
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_SHA::12}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.APP_DOMAIN }}
    steps:
      - name: Configure SSH
        run: |
          install -d -m 0700 ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          TAG: ${{ needs.build.outputs.tag }}
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh "$USER@$HOST" "IMAGE_TAG=$TAG /srv/virtua-fc/scripts/deploy.sh"

      - name: Smoke test
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh "$USER@$HOST" "/srv/virtua-fc/scripts/smoketest.sh"

      - name: Rollback on failure
        if: failure()
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh "$USER@$HOST" "/srv/virtua-fc/scripts/rollback.sh"
