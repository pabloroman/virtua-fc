apiVersion: v1
kind: Service
metadata:
  name: {{ include "virtua-fc.fullname" . }}-web
  labels:
    {{- include "virtua-fc.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    {{- include "virtua-fc.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
