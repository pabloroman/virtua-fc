# Production stack for VirtuaFC on a single Hetzner root server.
#
# Run from /srv/virtua-fc/compose/ with:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# Image source: ghcr.io/${GHCR_REPO}:${IMAGE_TAG}. The image is built in CI by
# .github/workflows/deploy.yml from the repo root Dockerfile (target: production).

name: virtua-fc

x-app-image: &app-image ghcr.io/${GHCR_REPO:?GHCR_REPO required}:${IMAGE_TAG:-latest}

x-app-env: &app-env
  APP_ENV: production
  APP_DEBUG: "false"
  APP_KEY: ${APP_KEY:?APP_KEY required}
  APP_URL: ${APP_URL:?APP_URL required}
  APP_LOCALE: ${APP_LOCALE:-es}
  APP_TIMEZONE: ${APP_TIMEZONE:-UTC}

  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE:-virtua_fc}
  DB_USERNAME: ${DB_USERNAME:-virtua_fc}
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
  DB_SSLMODE: disable

  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-null}

  SESSION_DRIVER: redis
  SESSION_ENCRYPT: "true"
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  BROADCAST_CONNECTION: log
  FILESYSTEM_DISK: local

  LOG_CHANNEL: stack
  LOG_STACK: daily,stderr
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_SLACK_WEBHOOK_URL: ${LOG_SLACK_WEBHOOK_URL:-}

  MAIL_MAILER: ${MAIL_MAILER:-resend}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:?MAIL_FROM_ADDRESS required}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-VirtuaFC}
  RESEND_API_KEY: ${RESEND_API_KEY:-}

  NIGHTWATCH_ENABLED: ${NIGHTWATCH_ENABLED:-true}
  NIGHTWATCH_TOKEN: ${NIGHTWATCH_TOKEN:-}

  PULSE_ENABLED: ${PULSE_ENABLED:-true}
  PULSE_DB_CONNECTION: pgsql

  TELESCOPE_ENABLED: "false"

  TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}
  OCTANE_SERVER: frankenphp

  BETA_MODE: ${BETA_MODE:-false}

services:
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    # traefik:v3.2 ships a Docker SDK that pins API version 1.24, which
    # modern Docker Engines (>= 25) reject ("client version 1.24 is too
    # old"). 3.3+ updated the embedded SDK; DOCKER_API_VERSION is set as
    # a belt-and-suspenders override in case of future engine bumps.
    environment:
      DOCKER_API_VERSION: "1.44"
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:?ACME_EMAIL required}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --accesslog=true
      - --log.level=INFO
      - --metrics.prometheus=true
      - --metrics.prometheus.entrypoint=metrics
      - --entrypoints.metrics.address=:8082
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/virtua-fc/traefik:/letsencrypt
    labels:
      - traefik.enable=true
    networks:
      - edge
      - internal

  app:
    image: *app-image
    restart: unless-stopped
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "true"
    volumes:
      - storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/up"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`${APP_DOMAIN:?APP_DOMAIN required}`)
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app.tls.certresolver=le
      - traefik.http.services.app.loadbalancer.server.port=8000
    networks:
      - edge
      - internal

  horizon:
    image: *app-image
    restart: unless-stopped
    command: ["php", "artisan", "horizon"]
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "false"
    # No HTTP server in this container, and 'php artisan horizon:status'
    # is unreliable as a docker healthcheck (it talks to Redis-backed
    # state and exits non-zero in the supervisor's own context). Disable
    # it here — smoketest.sh already validates Horizon by calling
    # horizon:status from inside the app container.
    healthcheck:
      disable: true
    volumes:
      - storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - internal

  scheduler:
    image: *app-image
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "false"
    # No HTTP server in this container — disable the image's default
    # HEALTHCHECK (which probes /up) so the scheduler isn't reported
    # as unhealthy forever.
    healthcheck:
      disable: true
    volumes:
      - storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - internal

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-virtua_fc}
      POSTGRES_USER: ${DB_USERNAME:-virtua_fc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
    # postgres:18+ stores data at /var/lib/postgresql/<major>/docker (a
    # major-version-nested layout that supports pg_upgrade --link). Mount
    # the parent dir so the image manages the version subdirectory itself.
    # See docker-library/postgres#1259. Servers bootstrapped under the old
    # ":/var/lib/postgresql/data" layout are migrated by the
    # "Migrate postgres data layout" step in .github/workflows/deploy.yml.
    volumes:
      - /var/lib/virtua-fc/postgres:/var/lib/postgresql
    # Bind to loopback only so a GUI client (TablePlus, pgAdmin, …) can
    # reach it via SSH local-forward without ever exposing 5432 publicly:
    #   ssh -L 5432:127.0.0.1:5432 deploy@<host>
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-virtua_fc} -d ${DB_DATABASE:-virtua_fc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - /var/lib/virtua-fc/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  storage:

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: false
